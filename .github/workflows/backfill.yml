# One-off archive backfill (agent brief C): Whisper-only, no Gemini, no email.
# Manually triggered; a bounded seeding burst, not a permanent grind.
#
# Flow: plan (inventory + chunking) → transcribe (parallel matrix, artifacts)
# → collect (merge artifacts, one commit to the private archive).
#
# PUBLIC LOGS: counts, titles, timings only — never transcript text.

name: Backfill transcripts

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to cover"
        default: "90"
      limit:
        description: "Max episodes total (0 = no cap) — use e.g. 3 for a dry run"
        default: "0"
      chunks:
        description: "Parallel chunks"
        default: "20"

permissions:
  contents: read   # archive pushes go via the deploy key, not GITHUB_TOKEN

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      chunk_ids: ${{ steps.plan.outputs.chunk_ids }}
      has_work: ${{ steps.plan.outputs.has_work }}
    steps:
      - uses: actions/checkout@v4
      - name: Check out archive (private repo, via deploy key)
        env:
          DEPLOY_KEY: ${{ secrets.ARCHIVE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/archive_key
          chmod 600 ~/.ssh/archive_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:domatt10/podcast-briefing-archive.git archive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - id: plan
        run: >
          python src/backfill_plan.py
          --days "${{ inputs.days }}"
          --limit "${{ inputs.limit }}"
          --chunks "${{ inputs.chunks }}"
          --archive archive --out plan.json
      - uses: actions/upload-artifact@v4
        with:
          name: plan
          path: plan.json

  transcribe:
    needs: plan
    if: needs.plan.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 350   # under the 6h cap; chunks are duration-balanced
    strategy:
      fail-fast: false     # one bad chunk must not cancel the rest
      max-parallel: 20
      matrix:
        chunk: ${{ fromJSON(needs.plan.outputs.chunk_ids) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: plan
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-models-v1
      - run: python src/backfill_transcribe.py --plan plan.json --chunk-id ${{ matrix.chunk }} --out out
      - uses: actions/upload-artifact@v4
        with:
          name: transcripts-${{ matrix.chunk }}
          path: out/
          if-no-files-found: warn

  collect:
    needs: [plan, transcribe]
    # Run even if some chunks failed — bank whatever succeeded.
    if: always() && needs.plan.outputs.has_work == 'true' && needs.transcribe.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Check out archive (private repo, via deploy key)
        env:
          DEPLOY_KEY: ${{ secrets.ARCHIVE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/archive_key
          chmod 600 ~/.ssh/archive_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" \
            git clone git@github.com:domatt10/podcast-briefing-archive.git archive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: "transcripts-*"
          path: artifacts
      - run: python src/backfill_collect.py --artifacts artifacts --archive archive
      - name: Commit to archive (single push, with retry against the daily job)
        run: |
          cd archive
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "Backfill: $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" git push && exit 0
            GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" git pull --rebase
          done
          exit 1
