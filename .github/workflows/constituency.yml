# Constituency Watch — weekly local digest (docs/constituency-watch-brief.md).
# Separate from the daily briefing; same secrets, archive and posture.
# PUBLIC LOGS: counts and geography names only — no story content.

name: Constituency Watch

on:
  workflow_dispatch:
  schedule:
    # Two chances (GitHub cron has no delivery guarantee); the pipeline's
    # last_digest_at suppression makes the second run silent.
    - cron: "47 4 * * 1"   # Mondays ~05:47 UTC (06:47 UK in summer) — primary
    - cron: "27 5 * * 1"   # Mondays ~06:27 UTC — backup

concurrency:
  group: constituency
  cancel-in-progress: false

permissions:
  contents: read   # archive pushes go via the deploy key

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check out archive (private repo, via deploy key)
        env:
          DEPLOY_KEY: ${{ secrets.ARCHIVE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/archive_key
          chmod 600 ~/.ssh/archive_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:domatt10/podcast-briefing-archive.git archive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run Constituency Watch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIEFING_FROM: ${{ secrets.BRIEFING_FROM }}
          BRIEFING_TO: ${{ secrets.BRIEFING_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARCHIVE_DIR: ${{ github.workspace }}/archive
        run: python src/constituency.py

      - name: Push archive updates (state + saved stories)
        run: |
          cd archive
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "archive unchanged"
          else
            git commit -m "Constituency Watch update $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" git push && break
              GIT_SSH_COMMAND="ssh -i ~/.ssh/archive_key -o IdentitiesOnly=yes" git pull --rebase
            done
          fi

      - name: Ping weekly dead-man's-switch (full success only)
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_URL_WEEKLY }}
        run: |
          if [ -n "$HC_URL" ]; then
            curl -fsS -m 10 --retry 3 "$HC_URL" > /dev/null
          else
            echo "HEALTHCHECK_URL_WEEKLY not set - skipping"
          fi

      - name: Report failure to weekly dead-man's-switch
        if: failure()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_URL_WEEKLY }}
        run: |
          if [ -n "$HC_URL" ]; then
            curl -fsS -m 10 --retry 3 "$HC_URL/fail" > /dev/null
          else
            echo "HEALTHCHECK_URL_WEEKLY not set - skipping"
          fi
