# All tunables live here. Secrets and email addresses do NOT — those come from
# environment variables (.env locally, GitHub Secrets in CI), because this repo
# will be public.

[whisper]
model = "medium"   # production accuracy target; override with "base"/"small" for fast local tests
# Domain glossary seeded into Whisper's initial_prompt — cuts mis-hearings in the RAW
# transcript so verbatim quotes stay faithful (spec §9). Extend freely.
glossary = "DESNZ, NESO, SSEP, Ofgem, CfD, contracts for difference, allocation round, GB Energy, Great British Energy, the Crown Estate, seabed leasing, Celtic Sea, offshore wind, floating wind, interconnectors, REMA, zonal pricing, net zero, Ed Miliband, Rachel Reeves, Andy Burnham, Makerfield by-election, Louise Haigh"

[gemini]
# Strongest free-tier model, as config because Google rotates/retires these (spec §7).
# (2026-07: Pro models are paid-only — free tier is the Flash family. Verified
# empirically: 2.5-pro returns 429 "limit: 0" on a free key.)
model = "gemini-3.5-flash"
fallback_model = "gemini-2.5-flash"

[email]
smtp_host = "smtp.gmail.com"
smtp_port = 587
# from/to addresses + app password come from env: BRIEFING_FROM, BRIEFING_TO, GMAIL_APP_PASSWORD

[storage]
data_dir = "data"   # scratch for downloaded audio (gitignored). Transcripts + state
                    # live in ARCHIVE_DIR (the private repo in CI; data/ locally).
archive_repo_url = "https://github.com/domatt10/podcast-briefing-archive"

[filtering]
min_duration_secs = 300        # skip trailers/clips (spec App. B junk filtering)
flag_feed_after_failures = 3   # consecutive failed runs before the footer flags a feed

[behaviour]
quiet_day_email = true   # send a one-liner on days with nothing new
                         # (one-email-per-day is enforced in code regardless:
                         # a late-fired second run holds its episodes for tomorrow)

# --- News layer (agent brief A.1): reported fact beside the speculation ------
# Saved as text files to /news/ in the private archive. No LLM involved.

[news]
# Non-politics feeds only keep stories matching these (title + summary):
energy_keywords = [
    "offshore wind", "wind farm", "wind power", "energy", "electricity",
    "grid", "net zero", "nuclear", "solar", "renewable", "DESNZ", "Ofgem",
    "oil and gas", "North Sea", "carbon", "Miliband", "power station",
    "hydrogen", "Great British Energy",
]
max_per_feed = 25   # per run — curation, not the firehose

[politico]
gmail_label = "Politico"   # the Gmail label the filter applies; read over IMAP
lookback_days = 3          # daily fetch window — read status is irrelevant
                           # (dedupe is by Message-ID filename), so Dom reading
                           # Playbook before the run can't hide emails anymore

[[news_feeds]]
name = "BBC Politics"
slug = "bbc-politics"
url = "https://feeds.bbci.co.uk/news/politics/rss.xml"
filter = "none"     # politics feed is already on-topic; keep all of it

[[news_feeds]]
name = "BBC Business"
slug = "bbc-business"
url = "https://feeds.bbci.co.uk/news/business/rss.xml"
filter = "energy"

[[news_feeds]]
name = "BBC Science & Environment"
slug = "bbc-science-environment"
url = "https://feeds.bbci.co.uk/news/science_and_environment/rss.xml"
filter = "energy"

# --- Constituency Watch (docs/constituency-watch-brief.md) -------------------
# Weekly LOCAL digest, offshore wind + tidal only. NOTE THE ALTITUDE INVERSION:
# this product keeps the ground-level detail the daily briefing bins. Its
# prompt lives in src/constituency.py and never touches profile.md.

[constituency]
recency = "when:14d"            # appended to every query at fetch time
max_leads_per_geography = 5     # cap so a noisy geography can't swamp the digest
state_memory_weeks = 5          # how far back "previously reported" context reaches

[[constituency_geographies]]
name = "Celtic Sea & Welsh waters"
slug = "celtic-sea"
# Injected into the selection prompt so the model knows the territory's edges.
bounds = "the Celtic Sea and all Welsh waters: south Wales coast, Pembrokeshire, Bristol Channel, north Devon and Cornwall, plus North Wales marine projects (Morlais, Mona, Morgan, Anglesey). England's east and south coasts and Scotland are OUT."
# TOML literal strings (single quotes) so the Google News operators survive.
queries = [
    '"Celtic Sea" ("floating wind" OR "offshore wind" OR "wind farm")',
    '("Port Talbot" OR "Milford Haven" OR "Pembroke Dock") ("floating wind" OR "offshore wind" OR "wind turbine" OR freeport)',
    '("Gwynt Glas" OR "Erebus" OR "Valorous" OR "White Cross" OR "TwinHub" OR "Llyr") ("floating wind" OR "offshore wind")',
    '("tidal energy" OR "tidal lagoon" OR "tidal stream" OR "tidal power") (Severn OR "Swansea Bay" OR "Bristol Channel" OR Pembrokeshire OR Cornwall OR Devon OR Wales)',
    '(substation OR pylons OR "grid connection" OR "cable landfall") ("south Wales" OR Pembrokeshire OR Carmarthenshire OR "north Devon" OR Cornwall) ("offshore wind" OR "wind farm" OR tidal) -"Cornwall Insight"',
]

[[constituency_geographies]]
name = "East Anglia"
slug = "east-anglia"
bounds = "the Norfolk, Suffolk and Essex coasts and the southern North Sea: the offshore arrays (North Falls, Five Estuaries, East Anglia array, Sheringham Shoal, Dudgeon), the onshore cable/substation/pylon corridors (Norwich to Tilbury, Sea Link, East Anglia GREEN), and the Lowestoft/Great Yarmouth port cluster. 'Sea Link' here means the National Grid subsea connection, never transport."
queries = [
    '("offshore wind" OR "wind farm") (Norfolk OR Suffolk OR "East Anglia")',
    '(pylons OR substation OR "cable route" OR "Sea Link" OR "Norwich to Tilbury" OR "East Anglia GREEN") (Norfolk OR Suffolk OR Essex)',
    '("North Falls" OR "Five Estuaries" OR "Sheringham Shoal" OR "Dudgeon") (wind OR offshore)',
    '(Lowestoft OR "Great Yarmouth") ("offshore wind" OR "wind farm" OR turbine)',
]

[[constituency_geographies]]
name = "Humber, Lincolnshire & Yorkshire"
slug = "humber"
bounds = "the Humber estuary and the Lincolnshire/East Yorkshire coast: Dogger Bank (incl. Dogger Bank South), Outer Dowsing, the Hornsea projects (the wind farms, not just the town), Grimsby/Immingham/Hull ports and the Siemens blade factory, and the onshore substation corridors. 'Boston' means the Lincolnshire town."
queries = [
    '("offshore wind" OR "wind farm") (Humber OR Grimsby OR Immingham OR Lincolnshire OR Hull OR "East Yorkshire")',
    '("Dogger Bank" OR "Outer Dowsing" OR "Hornsea Three" OR "Hornsea Four" OR "Hornsea Project") (wind OR offshore)',
    '(substation OR pylons OR "cable route") (Lincolnshire OR "East Riding" OR Humber) ("offshore wind" OR "wind farm")',
]

[[constituency_geographies]]
name = "Teesside & North East"
slug = "teesside"
bounds = "Teesside and the North East coast: Teesworks, Able, SeAH's monopile factory, South Bank Quay, Hartlepool, Blyth, Tyneside — mainly ports, manufacturing, jobs and supply chain for offshore wind."
queries = [
    '("offshore wind" OR "wind farm" OR turbine OR monopile) (Teesside OR Teesworks OR Hartlepool OR Blyth OR Tyneside OR Sunderland)',
    '(SeAH OR "South Bank Quay" OR "Able Seaton") (wind OR offshore OR monopile)',
]

[[constituency_geographies]]
name = "North West England (Irish Sea)"
slug = "north-west"
bounds = "the English side of the Irish Sea: Morgan and Morecambe offshore wind projects, the Walney extensions, Barrow-in-Furness as an O&M port, the Lancashire/Cumbria coast. 'Morgan' and 'Barrow' only count when clearly the wind project / the Cumbrian town. (Welsh Irish Sea projects belong to Celtic Sea & Welsh waters.)"
queries = [
    '("offshore wind" OR "wind farm") (Morecambe OR Walney OR "Barrow-in-Furness" OR Cumbria OR Lancashire OR "Irish Sea")',
    '("Morgan and Morecambe" OR "Morgan offshore") (wind OR offshore)',
]

[[constituency_geographies]]
name = "Scotland (low resolution)"
slug = "scotland"
bounds = "Scotland, deliberately at LOW resolution (an exception to the low-altitude rule): only major offshore-wind and tidal project milestones and significant national debates — ScotWind and INTOG majors, Berwick Bank, Green Volt, West of Orkney, MeyGen/Pentland Firth tidal. SKIP local Scottish planning minutiae, council rows and ScotWind leasing detail."
queries = [
    '("ScotWind" OR "Berwick Bank" OR "Green Volt" OR "West of Orkney" OR INTOG) (wind OR offshore)',
    '("tidal energy" OR "tidal stream" OR MeyGen) (Scotland OR Orkney OR "Pentland Firth")',
]

